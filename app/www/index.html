<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infeed — Knowledge That Hits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0F; --surface: #13131C; --surface2: #1C1C2A;
    --indigo: #6C63FF; --indigo-dim: rgba(108,99,255,0.15);
    --amber: #F5A623; --green: #2EE8A5; --rose: #FF6B8A; --sky: #38BDF8;
    --text: #F0EFF8; --text-dim: rgba(240,239,248,0.55); --border: rgba(255,255,255,0.08);
    --font-display: 'Space Grotesk', sans-serif; --font-body: 'Inter', sans-serif; --card-h: 100dvh;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }

  /* HEADER */
  header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; padding: 16px 20px 12px; background: linear-gradient(to bottom, #0A0A0F 60%, transparent); }
  .logo { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--indigo); }

  /* FEED */
  #feed { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  #feed::-webkit-scrollbar { display: none; }

  /* CARD */
  .card { height: var(--card-h); scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; align-items: flex-end; overflow: hidden; }
  .card-content { position: relative; z-index: 5; padding: 64px 80px 100px 24px; width: 100%; max-height: 100%; overflow-y: auto; scrollbar-width: none; box-sizing: border-box; }
  .card-content::-webkit-scrollbar { display: none; }
  .card-bg { position: absolute; inset: 0; z-index: 0; }
  .card-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,15,0.97) 0%, rgba(10,10,15,0.7) 45%, rgba(10,10,15,0.2) 100%); }
  .big-glyph { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -58%); font-size: clamp(120px, 35vw, 220px); opacity: 0.07; filter: blur(2px); user-select: none; z-index: 1; line-height: 1; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .cat-badge { padding: 4px 10px; border-radius: 6px; font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
  .read-time { font-size: 11px; color: var(--text-dim); }
  .card-headline { font-family: var(--font-display); font-size: clamp(22px, 6vw, 30px); font-weight: 700; line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 14px; color: var(--text); }
  .card-body { font-size: 15px; line-height: 1.65; color: rgba(240,239,248,0.82); }
  .card-body strong { color: var(--text); font-weight: 600; }
  .key-fact { margin-top: 18px; padding: 12px 14px; border-left: 3px solid var(--indigo); background: var(--indigo-dim); border-radius: 0 8px 8px 0; font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; }

  /* CARD ACTIONS */
  .card-actions { position: absolute; right: 18px; bottom: 96px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 10; }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--text); padding: 0; }
  .action-btn .icon-wrap { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.15s; backdrop-filter: blur(6px); }
  .action-btn .icon-wrap svg { width: 20px; height: 20px; }
  .action-btn:active .icon-wrap { transform: scale(0.9); }
  .action-btn.liked .icon-wrap { background: rgba(255,107,138,0.25); }
  .action-btn.liked .icon-wrap svg { stroke: var(--rose); fill: var(--rose); }
  .action-btn.saved .icon-wrap { background: rgba(108,99,255,0.25); }
  .action-btn.saved .icon-wrap svg { stroke: var(--indigo); fill: var(--indigo); }
  .action-btn.not-interested .icon-wrap { background: rgba(240,239,248,0.06); }
  .action-btn.not-interested .icon-wrap svg { stroke: var(--text-dim); }
  .action-btn .action-label { font-size: 10px; font-family: var(--font-display); font-weight: 600; color: var(--text-dim); letter-spacing: 0.3px; }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 16px; padding: 40px; text-align: center; }
  .empty-state h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
  .empty-state p { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

  /* "All caught up" celebration screen */
  .caught-up { gap: 14px; }
  .caught-up .cu-badge { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; animation: cuPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  .caught-up .cu-badge::before { content: ''; position: absolute; inset: -10px; border-radius: 50%; background: radial-gradient(circle at 50% 45%, rgba(46,232,165,0.38), rgba(108,99,255,0.20) 55%, transparent 72%); filter: blur(6px); animation: cuGlow 3s ease-in-out infinite; }
  .caught-up .cu-ring { position: absolute; inset: 0; border-radius: 50%; padding: 2px; background: linear-gradient(135deg, var(--green), var(--indigo)); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
  .caught-up .cu-disc { position: relative; width: 92px; height: 92px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
  .caught-up .cu-disc svg { width: 46px; height: 46px; }
  .caught-up .cu-check { stroke: var(--green); stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 44; stroke-dashoffset: 44; animation: cuDraw 0.5s ease 0.4s forwards; }
  .caught-up h2 { animation: fadeUp 0.5s ease 0.18s both; }
  .caught-up p { max-width: 280px; animation: fadeUp 0.5s ease 0.30s both; }
  .caught-up .cu-meta { margin-top: 2px; font-family: var(--font-display); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--green); animation: fadeUp 0.5s ease 0.42s both; }
  @keyframes cuPop { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }
  @keyframes cuGlow { 0%, 100% { opacity: 0.65; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.08); } }
  @keyframes cuDraw { to { stroke-dashoffset: 0; } }

  /* LOADING */
  .card-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; width: 100%; height: 100%; position: absolute; inset: 0; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card-content, .card-actions { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  /* BOTTOM NAV */
  nav { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: linear-gradient(to top, #0A0A0F 80%, transparent); display: flex; align-items: center; justify-content: space-around; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 8px 16px; color: var(--text-dim); font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; transition: color 0.2s; }
  .nav-btn.active { color: var(--indigo); }
  .nav-btn .nav-icon { width: 22px; height: 22px; display: block; margin-bottom: 1px; }

  /* TOAST */
  #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-8px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--text); z-index: 200; opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* PANELS */
  .panel { position: fixed; inset: 0; z-index: 300; display: none; align-items: flex-end; }
  .panel.open { display: flex; }
  .panel-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
  .panel-sheet { position: relative; z-index: 1; width: 100%; background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 24px 44px; border-top: 1px solid var(--border); max-height: 85vh; overflow-y: auto; }
  .panel-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .panel-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .panel-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }

  /* SHARE */
  .share-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 16px; }
  .share-opt { display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; color: var(--text); font-family: var(--font-display); font-size: 11px; font-weight: 500; }
  .share-opt .share-icon { width: 52px; height: 52px; border-radius: 14px; background: var(--surface2); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
  .share-opt .share-icon svg { width: 22px; height: 22px; }

  /* PROFILE */
  .profile-row { display: flex; align-items: center; margin-bottom: 14px; gap: 10px; }
  .profile-cat { font-family: var(--font-display); font-size: 13px; font-weight: 600; width: 110px; flex-shrink: 0; }
  .profile-bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .profile-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .profile-score { font-family: var(--font-display); font-size: 11px; color: var(--text-dim); width: 28px; text-align: right; flex-shrink: 0; }
  .profile-signal-row { margin-top: 6px; font-size: 12px; color: var(--text-dim); }
  .reset-btn { margin-top: 20px; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--rose); color: var(--rose); }
  .quota-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 18px; }
  .quota-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .quota-label { font-family: var(--font-display); font-size: 13px; font-weight: 600; }
  .quota-num { font-family: var(--font-display); font-size: 12px; color: var(--text-dim); }
  .quota-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .quota-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .logout-btn { margin-top: 10px; width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--indigo); color: var(--indigo); }

  /* SAVED VIEW */
  #saved-view { position: fixed; inset: 0; z-index: 90; background: var(--bg); display: none; flex-direction: column; padding: 60px 0 84px; }
  #saved-view.open { display: flex; }
  .saved-header { display: flex; align-items: baseline; gap: 10px; padding: 10px 24px 14px; }
  .saved-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .saved-count { font-size: 13px; color: var(--text-dim); font-family: var(--font-display); font-weight: 500; }
  #savedList { flex: 1; overflow-y: auto; padding: 0 18px 24px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
  #savedList::-webkit-scrollbar { display: none; }
  .saved-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 16px 18px; position: relative; }
  .saved-item-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .saved-item-headline { font-family: var(--font-display); font-size: 16px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; padding-right: 70px; }
  .saved-item-body { font-size: 13px; line-height: 1.55; color: rgba(240,239,248,0.72); }
  .saved-item-body strong { color: var(--text); font-weight: 600; }
  .saved-item-fact { margin-top: 12px; padding: 10px 12px; border-left: 3px solid var(--indigo); background: var(--indigo-dim); border-radius: 0 8px 8px 0; font-family: var(--font-display); font-size: 12px; font-weight: 500; line-height: 1.45; }
  .saved-unsave { position: absolute; top: 14px; right: 14px; background: rgba(108,99,255,0.18); border: none; border-radius: 8px; padding: 6px 11px; color: var(--indigo); font-family: var(--font-display); font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .saved-unsave:hover { background: rgba(108,99,255,0.3); }
  .saved-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; text-align: center; color: var(--text-dim); padding: 40px; }
  .saved-empty h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
  .saved-empty p { font-size: 14px; line-height: 1.5; }

  /* AUTH OVERLAY */
  #auth-overlay { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 32px 26px; }
  #auth-overlay.open { display: flex; }
  .auth-logo { font-family: var(--font-display); font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
  .auth-logo span { color: var(--indigo); }
  .auth-tagline { font-size: 13px; color: var(--text-dim); margin-bottom: 34px; text-align: center; }
  .auth-card { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
  .auth-card label { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .auth-card input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; }
  .auth-card input:focus { border-color: var(--indigo); }
  .auth-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--indigo); color: white; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-toggle { text-align: center; font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .auth-toggle button { background: none; border: none; color: var(--indigo); font-family: var(--font-display); font-weight: 600; font-size: 13px; cursor: pointer; }
  .auth-error { color: var(--rose); font-size: 13px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-logo">in<span>feed</span></div>
  <p class="auth-tagline">Knowledge that hits. Sign in to start your feed.</p>
  <form class="auth-card" id="authForm" onsubmit="submitAuth(event)">
    <div>
      <label>Email</label>
      <input type="email" id="authEmail" autocomplete="email" placeholder="you@example.com" required>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="authPassword" autocomplete="current-password" placeholder="••••••••" minlength="6" required>
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="auth-btn" id="authSubmit" type="submit">Sign in</button>
    <div class="auth-toggle" id="authToggle">
      New here? <button type="button" onclick="toggleAuthMode()">Create an account</button>
    </div>
  </form>
</div>

<header>
  <div class="logo">in<span>feed</span></div>
</header>

<div id="feed"></div>

<nav>
  <button class="nav-btn active" id="navFeed" onclick="showFeed()">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Feed
  </button>
  <button class="nav-btn" id="navSaved" onclick="openSaved()">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    Saved
  </button>
  <button class="nav-btn" onclick="openProfile()">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    You
  </button>
</nav>

<!-- Saved view -->
<div id="saved-view">
  <div class="saved-header">
    <span class="saved-title">Saved</span>
    <span class="saved-count" id="savedCount"></span>
  </div>
  <div id="savedList"></div>
</div>

<div id="toast"></div>

<!-- Share panel -->
<div id="share-panel" class="panel">
  <div class="panel-backdrop" onclick="closeShare()"></div>
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <div class="panel-title">Share this insight</div>
    <div class="share-options">
      <button class="share-opt" onclick="copyShareText()">
        <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>Copy
      </button>
      <button class="share-opt" onclick="closeShare();showToast('Shared!')">
        <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>Message
      </button>
      <button class="share-opt" onclick="closeShare();showToast('Opening Twitter...')">
        <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16M4 20L20 4"/></svg></div>X
      </button>
      <button class="share-opt" onclick="closeShare();showToast('Opening WhatsApp...')">
        <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- Profile panel -->
<div id="profile-panel" class="panel">
  <div class="panel-backdrop" onclick="closeProfile()"></div>
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <div class="panel-title">Your taste profile</div>
    <p class="panel-sub">Built from your likes, saves, shares, and reading time</p>
    <div id="profileContent"></div>
    <button class="reset-btn" onclick="resetProfile()">Reset taste profile</button>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CATEGORY CONFIG
// ═══════════════════════════════════════════════

const CATS = ['Science','History','Economics','Psychology','Technology','Philosophy','Health'];

const CAT_COLORS = {
  Science:    { badge: '#2EE8A5', bg: 'rgba(46,232,165,0.06)',  glyph: '⚗️' },
  History:    { badge: '#F5A623', bg: 'rgba(245,166,35,0.06)',  glyph: '🏛️' },
  Economics:  { badge: '#38BDF8', bg: 'rgba(56,189,248,0.06)',  glyph: '📈' },
  Psychology: { badge: '#C084FC', bg: 'rgba(192,132,252,0.06)', glyph: '🧠' },
  Technology: { badge: '#6C63FF', bg: 'rgba(108,99,255,0.06)',  glyph: '⚡' },
  Philosophy: { badge: '#F0EFF8', bg: 'rgba(240,239,248,0.04)', glyph: '💡' },
  Health:     { badge: '#2EE8A5', bg: 'rgba(46,232,165,0.06)',  glyph: '🫀' },
  Default:    { badge: '#6C63FF', bg: 'rgba(108,99,255,0.06)',  glyph: '🌐' },
};
function getCatColors(cat) { return CAT_COLORS[cat] || CAT_COLORS.Default; }

// ═══════════════════════════════════════════════
//  BACKEND API
//  Cards now come from the Infeed backend (was localStorage).
//  Override the base URL for a real device / production by running:
//    localStorage.setItem('infeedApiBase', 'https://api.yourdomain.com')
// ═══════════════════════════════════════════════

function defaultApiBase() {
  // Production backend deployed on Railway (HTTPS, no port — TLS on 443).
  // For local LAN development, override in the console:
  //   localStorage.setItem('infeedApiBase', 'http://10.0.0.198:3000')
  return 'https://infeed-server-production.up.railway.app';
}
const API_BASE = localStorage.getItem('infeedApiBase') || defaultApiBase();

function getToken() { return localStorage.getItem('infeedToken'); }
function setToken(t) { if (t) localStorage.setItem('infeedToken', t); else localStorage.removeItem('infeedToken'); }

async function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  const tok = getToken();
  if (tok) headers['Authorization'] = 'Bearer ' + tok;
  console.log('[api] ' + (opts.method || 'GET') + ' ' + API_BASE + path);
  const res = await fetch(API_BASE + path, Object.assign({}, opts, { headers }));
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error((data && data.error) || ('HTTP ' + res.status));
    err.status = res.status; err.data = data;
    throw err;
  }
  return data;
}

// Tell the backend a card actually scrolled into view, so it's never served again.
// Fire-and-forget; on failure we drop it from the set so it can retry later.
function markSeen(dbId) {
  if (dbId == null || confirmedSeen.has(dbId)) return;
  confirmedSeen.add(dbId);
  api('/api/cards/seen', { method: 'POST', body: JSON.stringify({ id: dbId }) })
    .catch(() => confirmedSeen.delete(dbId));
}

// free-trial state, surfaced in the profile panel
let trialInfo = { tier: 'free', onTrial: true, expired: false, daysLeft: null, trialEndsAt: null };
function updateTrial(d) {
  if (d && d.trial) trialInfo = d.trial;
}

// ═══════════════════════════════════════════════
//  RECOMMENDATION ENGINE (taste profile stays on-device)
// ═══════════════════════════════════════════════

const SIGNAL_WEIGHTS = { like: 3, save: 5, share: 4, dwell: 2, skim: 0.5, skip: -1, not_interested: -2 };

function loadProfile() {
  try {
    const raw = localStorage.getItem('infeedProfile');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { categories: Object.fromEntries(CATS.map(c => [c, 0])), totalSignals: 0, history: [] };
}
function saveProfile(p) { localStorage.setItem('infeedProfile', JSON.stringify(p)); }

let profile = loadProfile();

function recordSignal(type, cardData) {
  if (!cardData) return;
  const w = SIGNAL_WEIGHTS[type] || 0;
  const cat = cardData.category;
  if (cat && profile.categories[cat] !== undefined) {
    profile.categories[cat] = Math.max(-10, Math.min(20, (profile.categories[cat] || 0) + w));
  }
  profile.totalSignals = (profile.totalSignals || 0) + 1;
  if (w >= 3 && cardData.headline) {
    profile.history = [{ cat, headline: cardData.headline }, ...profile.history].slice(0, 20);
  }
  saveProfile(profile);
}

// Reverse a previously recorded signal (used when a user undoes "Less").
function unrecordSignal(type, cardData) {
  if (!cardData) return;
  const w = SIGNAL_WEIGHTS[type] || 0;
  const cat = cardData.category;
  if (cat && profile.categories[cat] !== undefined) {
    profile.categories[cat] = Math.max(-10, Math.min(20, (profile.categories[cat] || 0) - w));
  }
  profile.totalSignals = Math.max(0, (profile.totalSignals || 0) - 1);
  saveProfile(profile);
}

function topCategories(n = 3) {
  return Object.entries(profile.categories)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1] - a[1])
    .slice(0, n)
    .map(([k]) => k);
}

function isPersonalised() { return (profile.totalSignals || 0) >= 5; }

// ═══════════════════════════════════════════════
//  DWELL TIME TRACKER
// ═══════════════════════════════════════════════

let dwellMap = {};
function startDwell(idx, cardData) { dwellMap[idx] = { start: Date.now(), cardData, signalled: false }; }
function endDwell(idx) {
  const d = dwellMap[idx];
  if (!d || d.signalled) return;
  d.signalled = true;
  const elapsed = (Date.now() - d.start) / 1000;
  const expected = d.cardData?.readSeconds || 30;
  if (elapsed >= expected * 0.8) recordSignal('dwell', d.cardData);
  else if (elapsed >= expected * 0.3) recordSignal('skim', d.cardData);
  else if (elapsed < 3) recordSignal('skip', d.cardData);
}

// ═══════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════

let cardIndex = 0;
let loading = false;
let trialEnded = false;
let reachedEnd = false;
let seenHeadlines = [];
let confirmedSeen = new Set();
let likedCards = new Set();
let notInterested = new Set();   // card indices marked "Less"
let savedIds = new Set();        // dbIds the user has bookmarked (mirrors the backend)
let currentShareText = '';
let cardDataMap = {};
let currentVisibleIdx = null;
const PRELOAD_THRESHOLD = 2;

// ═══════════════════════════════════════════════
//  FEED
// ═══════════════════════════════════════════════

async function loadCards(count = 2) {
  if (loading || trialEnded || reachedEnd) return;
  loading = true;
  try {
    const params = new URLSearchParams();
    params.set('limit', String(count));
    if (seenHeadlines.length) params.set('exclude', JSON.stringify(seenHeadlines.slice(-200)));
    const prefer = topCategories(3);
    if (prefer.length) params.set('prefer', JSON.stringify(prefer));

    const data = await api('/api/cards?' + params.toString());
    updateTrial(data);

    if (!data.cards || data.cards.length === 0) {
      // server has no unseen cards left for this user
      reachedEnd = true;
      if (cardIndex === 0) {
        data.caughtUp ? showCaughtUpState() : showEmptyState();
      } else {
        appendEndCard();
      }
      return;
    }
    for (const card of data.cards) {
      seenHeadlines.push(card.headline);
      renderCard(card);
    }
  } catch (e) {
    if (e.status === 401) { setToken(null); showAuth(); }
    else if (e.status === 402) {
      trialEnded = true;
      updateTrial(e.data);
      if (cardIndex === 0) showTrialExpiredState();
      else showToast('Your free trial has ended');
    } else {
      if (cardIndex === 0) showErrorState(e.message);
      else showToast('Connection problem');
    }
  } finally {
    loading = false;
  }
}

function showEmptyState() {
  document.getElementById('feed').innerHTML = `
    <div class="empty-state">
      <h2>No cards yet</h2>
      <p>The library is being filled. Check back soon.</p>
    </div>`;
}

// Shared "all caught up" content — used by both the first-load screen and the
// mid-feed end card so the two stay identical.
function caughtUpInner() {
  return `
    <div class="cu-badge">
      <div class="cu-ring"></div>
      <div class="cu-disc">
        <svg viewBox="0 0 52 52" aria-hidden="true">

        </svg>
      </div>
    </div>
    <h2>You're all caught up</h2>
    <p>You've read every card in the library. Fresh knowledge lands tomorrow.</p>
    <div class="cu-meta">Check back tomorrow</div>`;
}

// First-load "all caught up" screen (user has seen the whole library).
function showCaughtUpState() {
  document.getElementById('feed').innerHTML = `
    <div class="empty-state caught-up">${caughtUpInner()}</div>`;
}

// Mid-feed end card — snaps into view after the last card the user scrolls through.
function appendEndCard() {
  if (document.getElementById('endCard')) return;
  const el = document.createElement('div');
  el.className = 'card';
  el.id = 'endCard';
  el.innerHTML = `
    <div class="card-bg" style="background:rgba(108,99,255,0.06);"></div>
    <div class="empty-state caught-up" style="width:100%;height:100%;">${caughtUpInner()}</div>`;
  document.getElementById('feed').appendChild(el);
}

function showTrialExpiredState() {
  document.getElementById('feed').innerHTML = `
    <div class="empty-state">
      <h2>Your free trial has ended</h2>
      <p>Your free trial is over. Subscribe to keep your Infeed going — unlimited knowledge, every day.</p>
      <button class="auth-btn" style="max-width:240px" disabled>Subscribe (coming soon)</button>
    </div>`;
}

function showErrorState(msg) {
  document.getElementById('feed').innerHTML = `
    <div class="empty-state">
      <h2>Can't reach the feed</h2>
      <p>${escHtml(msg || 'Check your connection and try again.')}</p>
      <button class="auth-btn" style="max-width:200px" onclick="startFeed()">Retry</button>
    </div>`;
}

function renderCard(data) {
  const idx = cardIndex++;
  cardDataMap[idx] = data;
  const colors = getCatColors(data.category);
  const readText = data.readSeconds < 60 ? `${data.readSeconds}s` : `${Math.round(data.readSeconds/60)}m`;

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.idx = idx;
  el.innerHTML = `
    <div class="card-bg" style="background:${colors.bg};"></div>
    <div class="big-glyph">${colors.glyph}</div>
    <div class="card-content">
      <div class="card-meta">
        <span class="cat-badge" style="background:${colors.badge}22;color:${colors.badge};">${data.category}</span>
        <span class="read-time">${readText} read</span>
      </div>
      <h2 class="card-headline">${escHtml(data.headline)}</h2>
      <p class="card-body">${data.body}</p>
      <div class="key-fact">${escHtml(data.keyFact)}</div>
    </div>
    <div class="card-actions">
      <button class="action-btn" onclick="toggleLike(this,${idx})">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
        <span class="action-label">Like</span>
      </button>
      <button class="action-btn${savedIds.has(data.dbId) ? ' saved' : ''}" data-dbid="${data.dbId}" onclick="toggleSave(this,${idx})">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
        <span class="action-label">${savedIds.has(data.dbId) ? 'Saved!' : 'Save'}</span>
      </button>
      <button class="action-btn" onclick="openShare(${idx},\`${escAttr(data.headline)}\`,\`${escAttr(data.keyFact)}\`)">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
        <span class="action-label">Share</span>
      </button>
      <button class="action-btn" onclick="markNotInterested(this,${idx})">
        <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
        <span class="action-label">Less</span>
      </button>
    </div>`;

  document.getElementById('feed').appendChild(el);
  observeCard(el);
}

// ═══════════════════════════════════════════════
//  INTERSECTION OBSERVER
// ═══════════════════════════════════════════════

let observer;
function observeCard(el) {
  if (!observer) {
    observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        const idx = parseInt(e.target.dataset.idx);
        if (e.isIntersecting) {
          if (currentVisibleIdx !== null && currentVisibleIdx !== idx) endDwell(currentVisibleIdx);
          currentVisibleIdx = idx;
          const data = cardDataMap[idx];
          startDwell(idx, data);
          if (data) markSeen(data.dbId);   // confirm the card actually scrolled into view
          checkPreload(e.target);
        }
      });
    }, { threshold: 0.6 });
  }
  observer.observe(el);
}

function checkPreload(visibleCard) {
  const cards = Array.from(document.getElementById('feed').querySelectorAll('.card'));
  if (cards.indexOf(visibleCard) >= cards.length - PRELOAD_THRESHOLD) loadCards(2);
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════

function toggleLike(btn, idx) {
  const data = cardDataMap[idx];
  if (likedCards.has(idx)) { likedCards.delete(idx); btn.classList.remove('liked'); showToast('Like removed'); }
  else { likedCards.add(idx); btn.classList.add('liked'); showToast('❤️ Liked!'); recordSignal('like', data); }
}

function setSaveBtn(btn, saved) {
  if (!btn) return;
  btn.classList.toggle('saved', saved);
  const label = btn.querySelector('.action-label');
  if (label) label.textContent = saved ? 'Saved!' : 'Save';
}

async function toggleSave(btn, idx) {
  const data = cardDataMap[idx];
  if (!data || data.dbId == null) return;
  const id = data.dbId;
  const wasSaved = savedIds.has(id);
  // optimistic update
  setSaveBtn(btn, !wasSaved);
  if (wasSaved) savedIds.delete(id);
  else { savedIds.add(id); recordSignal('save', data); }
  try {
    await api('/api/cards/' + id + '/save', { method: wasSaved ? 'DELETE' : 'POST' });
    showToast(wasSaved ? 'Removed from saved' : '🔖 Saved!');
  } catch (e) {
    // revert on failure
    setSaveBtn(btn, wasSaved);
    if (wasSaved) savedIds.add(id); else savedIds.delete(id);
    if (e.status === 401) { setToken(null); showAuth(); }
    else showToast("Couldn't update saved");
  }
}

function markNotInterested(btn, idx) {
  const data = cardDataMap[idx];
  const label = btn.querySelector('.action-label');
  if (notInterested.has(idx)) {
    notInterested.delete(idx);
    btn.classList.remove('not-interested');
    if (label) label.textContent = 'Less';
    showToast('Undone');
    unrecordSignal('not_interested', data);
  } else {
    notInterested.add(idx);
    btn.classList.add('not-interested');
    if (label) label.textContent = 'Ok';
    showToast('Got it — less of this');
    recordSignal('not_interested', data);
  }
}

async function openShare(idx, headline, fact) {
  const shareText = `"${headline}"\n\n${fact}\n\nLearn something new on Infeed`;
  currentShareText = shareText;
  recordSignal('share', cardDataMap[idx]);

  const cap = window.Capacitor;

  // Native Capacitor Share plugin — fires the real Android/iOS share intent.
  // The Web Share API (navigator.share) is NOT implemented in the Android
  // WebView, so on-device we must go through the plugin.
  if (cap && cap.isNativePlatform && cap.isNativePlatform() && cap.Plugins && cap.Plugins.Share) {
    try {
      await cap.Plugins.Share.share({
        title: 'Infeed',
        text: shareText,
        dialogTitle: 'Share this insight',
      });
    } catch (e) {
      // User dismissed the sheet -> message contains "cancel"; ignore that.
      // Any real failure: fall back to clipboard so the share still works.
      if (!(e && /cancel/i.test(e.message || ''))) copyShareText();
    }
    return;
  }

  // Browser Web Share API (mobile browsers / desktop that support it).
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Infeed', text: shareText });
    } catch (e) {
      if (e && e.name !== 'AbortError') copyShareText();
    }
    return;
  }

  // Final fallback — copy the text to the clipboard.
  copyShareText();
}
function closeShare() { document.getElementById('share-panel').classList.remove('open'); }
function copyShareText() { navigator.clipboard.writeText(currentShareText).catch(()=>{}); closeShare(); showToast('📋 Copied to clipboard'); }

// ═══════════════════════════════════════════════
//  PROFILE PANEL
// ═══════════════════════════════════════════════

function openProfile() { renderProfileSheet(); document.getElementById('profile-panel').classList.add('open'); }
function closeProfile() { document.getElementById('profile-panel').classList.remove('open'); }

function renderProfileSheet() {
  const total = profile.totalSignals || 0;
  const scores = profile.categories;
  const maxScore = Math.max(...Object.values(scores), 1);
  const CAT_COLOR_MAP = { Science:'#2EE8A5', History:'#F5A623', Economics:'#38BDF8', Psychology:'#C084FC', Technology:'#6C63FF', Philosophy:'#F0EFF8', Health:'#2EE8A5' };
  const rows = [...CATS].sort((a,b) => (scores[b]||0) - (scores[a]||0)).map(cat => {
    const score = Math.max(0, scores[cat] || 0);
    const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    return `<div class="profile-row">
      <div class="profile-cat">${cat}</div>
      <div class="profile-bar-bg"><div class="profile-bar-fill" style="width:${pct}%;background:${CAT_COLOR_MAP[cat]||'#6C63FF'};"></div></div>
      <div class="profile-score">${score}</div>
    </div>`;
  }).join('');
  const statusLine = !isPersonalised()
    ? `<p style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">Personalisation kicks in after ${5 - total} more interactions.</p>`
    : `<p style="font-size:12px;color:var(--green);margin-bottom:16px;">✓ Feed is personalised — ${total} interactions recorded.</p>`;

  let trialBox;
  if (!trialInfo.onTrial) {
    trialBox = `<div class="quota-box"><div class="quota-top"><span class="quota-label">Subscription</span><span class="quota-num">${trialInfo.tier || 'active'}</span></div></div>`;
  } else if (trialInfo.expired) {
    trialBox = `<div class="quota-box">
      <div class="quota-top"><span class="quota-label">Free trial</span><span class="quota-num" style="color:var(--rose);">Expired</span></div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px;">Subscribe to keep reading.</div>
    </div>`;
  } else {
    const d = trialInfo.daysLeft;
    const label = d == null ? 'Active' : `${d} day${d === 1 ? '' : 's'} left`;
    trialBox = `<div class="quota-box">
      <div class="quota-top"><span class="quota-label">Free trial</span><span class="quota-num" style="color:var(--green);">${label}</span></div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px;">Unlimited cards during your trial.</div>
    </div>`;
  }

  document.getElementById('profileContent').innerHTML = `${trialBox}${statusLine}${rows}
    <div class="profile-signal-row">Based on ${total} interactions — likes, saves, shares, and reading time.</div>`;
}

function resetProfile() {
  if (!confirm('Reset taste profile?')) return;
  profile = { categories: Object.fromEntries(CATS.map(c => [c, 0])), totalSignals: 0, history: [] };
  saveProfile(profile);
  closeProfile();
  showToast('Profile reset');
}

function logout() {
  setToken(null);
  savedIds = new Set();
  showFeed();
  closeProfile();
  showAuth();
}

//  SAVED VIEW
// ═══════════════════════════════════════════════

function setActiveNav(savedActive) {
  document.getElementById('navFeed').classList.toggle('active', !savedActive);
  document.getElementById('navSaved').classList.toggle('active', savedActive);
}

function showFeed() {
  document.getElementById('saved-view').classList.remove('open');
  setActiveNav(false);
}

async function openSaved() {
  setActiveNav(true);
  document.getElementById('saved-view').classList.add('open');
  const list = document.getElementById('savedList');
  list.innerHTML = '<div class="saved-empty"><div class="spinner"></div></div>';
  document.getElementById('savedCount').textContent = '';
  try {
    const data = await api('/api/saved');
    renderSaved(data.cards || []);
  } catch (e) {
    if (e.status === 401) { setToken(null); showAuth(); return; }
    list.innerHTML = `<div class="saved-empty"><h2>Couldn't load saved</h2><p>${escHtml(e.message || 'Check your connection and try again.')}</p></div>`;
  }
}

function renderSaved(cards) {
  savedIds = new Set(cards.map(c => c.dbId));   // refresh mirror from the source of truth
  syncFeedSaveButtons();
  document.getElementById('savedCount').textContent = cards.length ? `${cards.length} card${cards.length === 1 ? '' : 's'}` : '';
  const list = document.getElementById('savedList');
  if (!cards.length) {
    list.innerHTML = `<div class="saved-empty"><div style="font-size:40px;">🔖</div><h2>No saved cards yet</h2><p>Tap Save on any card and it'll show up here.</p></div>`;
    return;
  }
  list.innerHTML = cards.map(c => {
    const colors = getCatColors(c.category);
    return `<div class="saved-item" data-dbid="${c.dbId}">
      <button class="saved-unsave" onclick="unsaveFromList(${c.dbId})">Remove</button>
      <div class="saved-item-meta">
        <span class="cat-badge" style="background:${colors.badge}22;color:${colors.badge};">${escHtml(c.category)}</span>
      </div>
      <div class="saved-item-headline">${escHtml(c.headline)}</div>
      <div class="saved-item-body">${c.body}</div>
      <div class="saved-item-fact">${escHtml(c.keyFact)}</div>
    </div>`;
  }).join('');
}

async function unsaveFromList(id) {
  try {
    await api('/api/cards/' + id + '/save', { method: 'DELETE' });
    savedIds.delete(id);
    const item = document.querySelector(`.saved-item[data-dbid="${id}"]`);
    if (item) item.remove();
    syncFeedSaveButtons();
    const remaining = document.querySelectorAll('.saved-item').length;
    if (!remaining) renderSaved([]);
    else document.getElementById('savedCount').textContent = `${remaining} card${remaining === 1 ? '' : 's'}`;
    showToast('Removed from saved');
  } catch (e) {
    if (e.status === 401) { setToken(null); showAuth(); }
    else showToast("Couldn't remove");
  }
}

// Keep any visible feed Save buttons in sync with the saved mirror.
function syncFeedSaveButtons() {
  document.querySelectorAll('#feed .action-btn[data-dbid]').forEach(btn => {
    setSaveBtn(btn, savedIds.has(Number(btn.dataset.dbid)));
  });
}

// Load the user's saved ids so feed Save buttons render correctly.
async function loadSavedIds() {
  try {
    const data = await api('/api/saved');
    savedIds = new Set((data.cards || []).map(c => c.dbId));
    syncFeedSaveButtons();
  } catch (e) { /* non-fatal */ }
}

// ═══════════════════════════════════════════════
//  AUTH SCREEN
// ═══════════════════════════════════════════════

let authMode = 'login'; // 'login' | 'register'

function showAuth() {
  document.getElementById('auth-overlay').classList.add('open');
  document.getElementById('authError').textContent = '';
}
function hideAuth() { document.getElementById('auth-overlay').classList.remove('open'); }

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('authSubmit').textContent = authMode === 'login' ? 'Sign in' : 'Create account';
  document.getElementById('authPassword').setAttribute('autocomplete', authMode === 'login' ? 'current-password' : 'new-password');
  document.getElementById('authToggle').innerHTML = authMode === 'login'
    ? `New here? <button type="button" onclick="toggleAuthMode()">Create an account</button>`
    : `Have an account? <button type="button" onclick="toggleAuthMode()">Sign in</button>`;
  document.getElementById('authError').textContent = '';
}

async function submitAuth(ev) {
  ev.preventDefault();
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmit');
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = '...';
  try {
    const path = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const data = await api(path, { method: 'POST', body: JSON.stringify({ email, password }) });
    setToken(data.token);
    if (data.user) trialInfo.tier = data.user.tier;
    hideAuth();
    startFeed();
  } catch (e) {
    errEl.textContent = e.message || 'Something went wrong';
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════

function escHtml(str='') { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(str='') { return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════

function startFeed() {
  showFeed();
  document.getElementById('feed').innerHTML = '';
  cardIndex = 0;
  seenHeadlines = [];
  confirmedSeen = new Set();
  likedCards = new Set();
  notInterested = new Set();
  trialEnded = false;
  reachedEnd = false;
  cardDataMap = {};
  loadCards(3);
  loadSavedIds();
}

async function init() {
  if (!getToken()) { showAuth(); return; }
  try {
    const me = await api('/api/me');
    updateTrial(me);
    hideAuth();
    startFeed();
  } catch (e) {
    setToken(null);
    showAuth();
  }
}

init();
</script>
